theme: "hugo-agency-web"
languageCode: "en-us"

build:
  buildStats:
    enable: true

  cachebusters:
    - source: "assets/notwatching/hugo_stats\\.json"
      target: "css"

    - source: "(postcss|tailwind)\\.config\\.js"
      target: "css"

module:
  mounts:
    - source: "hugo_stats.json"
      target: "assets/notwatching/hugo_stats.json"
      disableWatch: true

    - source: "assets"
      target: "assets"

taxonomies:
  series: "series"
  tags: "tags"
