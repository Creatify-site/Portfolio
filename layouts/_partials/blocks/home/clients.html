<section id="clients" class="clients relative py-16 xl:py-24 overflow-hidden">
  <div class="container mx-auto px-4">
    <h1 class="text-2xl font-medium leading-relaxed text-center xl:max-w-1/2 mx-auto mb-16">{{ .title }}</h1>
    <div class="flex flex-col xl:flex-row items-center justify-around flex-wrap gap-10">
      {{ range .items }}
        {{ if .icon }}
          <div class="flex flex-col items-center gap-2 text-[#868686] hover:text-primary transition-colors duration-300" title="{{ .name }}">
            <i class="{{ .icon }} text-4xl"></i>
            <span class="text-sm font-medium">{{ .name }}</span>
          </div>
        {{ else }}
          {{ partial "utilities/image" (dict "src" .image "alt" .name "class" "h-16 w-auto")}}
        {{ end }}
      {{ end }}
    </div>
  </div>
</section>
