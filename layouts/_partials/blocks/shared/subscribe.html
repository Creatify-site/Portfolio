<section id="subscribe" class="subscribe relative py-36 overflow-hidden bg-primary/10">
  <div class="container mx-auto px-4">
    <h2 class="text-3xl font-semibold leading-relaxed text-center xl:max-w-1/3 mx-auto mb-20">{{ .title }}</h2>
    <form
      class="flex flex-col xl:flex-row xl:items-center justify-stretch gap-3.5 xl:max-w-1/2 mx-auto"
      {{ with .method }}method="{{ . }}"{{ end }}
      action="{{ printf "mailto:%s" (index site.Params.contact 0) | safeURL }}"
      {{ with .enctype }}enctype="{{ . }}"{{ end }}
    >
      <label for="subscribe-email" class="hidden">Email</label>
      <input id="subscribe-email" class="bg-white grow-1 shadow rounded-xl px-9 py-5" type="email" name="Email" value="" required {{ with .placeholder }}placeholder="{{ . }}"{{ end }} />
      <button class="bg-primary hover:bg-primary/90 text-white py-5 px-11 rounded-xl cursor-pointer duration-500" type="submit">{{ default "SUBSCRIBE" .label }}</button>
    </form>
    <p class="text-center text-xs text-[#868686] mt-4">This opens your email app with a subscribe request pre-filled, nothing is sent automatically.</p>
  </div>
</section>
